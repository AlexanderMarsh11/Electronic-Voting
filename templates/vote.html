<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Vote</title>
</head>
<body>

  <!-- Public Navigation -->
  <nav style="margin-bottom: 16px;">
    <a href="/vote">🗳️ Vote</a>
    &nbsp;|&nbsp;
    <a href="/results/{{ election_id }}">📊 Results</a>
  </nav>
  <hr style="margin-bottom:16px;">

  <!-- Election Selector -->
  <form method="GET" action="/vote" style="margin-bottom:12px;">
    <label><b>Select Election:</b></label>
    <select name="election_id" onchange="this.form.submit()">
      {% for e in elections %}
        <option value="{{ e.id }}" {% if e.id == election_id %}selected{% endif %}>
          #{{ e.id }} - {{ e.title }} ({{ e.status }})
        </option>
      {% endfor %}
    </select>
    <noscript><button type="submit">Go</button></noscript>
  </form>

  <h2>
    Election: {{ election.title }} (ID: {{ election_id }})
  </h2>

  <p>
    Status: {{ election.status }} |
    Window: {{ election.ballot_open }} → {{ election.ballot_close }}
  </p>

  {% if candidates|length == 0 %}
    <p><b>No candidates yet.</b> Ask admin to add candidates.</p>
  {% else %}
    <form method="POST" action="/vote">
      <!-- Keep selected election when submitting vote -->
      <input type="hidden" name="election_id" value="{{ election_id }}" />

      <label>National ID:</label>
      <input name="national_id" placeholder="e.g., 111222333" required />
      <br><br>

      <label>District (1 letter):</label>
      <input name="district" value="A" maxlength="1" />
      <br><br>

      <label>Candidate:</label>
      <select name="candidate" required>
        {% for c in candidates %}
          <option value="{{ c }}">{{ c }}</option>
        {% endfor %}
      </select>
      <br><br>

      <button type="submit">Submit Vote</button>
    </form>
  {% endif %}

</body>
</html>
